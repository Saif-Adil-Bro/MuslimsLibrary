<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Edit - Dark Mode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0B0F19; /* Deep Dark Background */
            color: #E2E8F0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .phone-container {
            width: 380px;
            background-color: #111827; /* Slightly lighter dark for card */
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #1F2937;
        }

        /* Header Style */
        .header {
            background-color: #EC4899; /* Accent Pink from original app */
            color: #FFFFFF;
            padding: 20px;
            display: flex;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .header .back-btn {
            margin-right: 15px;
            cursor: pointer;
            font-size: 24px;
            transition: transform 0.2s;
        }
        .header .back-btn:hover {
            transform: translateX(-3px);
        }

        .header .title {
            flex-grow: 1;
        }

        .header .tick-btn {
            cursor: pointer;
            font-size: 22px;
            transition: transform 0.2s, color 0.2s;
        }
        .header .tick-btn:hover {
            transform: scale(1.1);
            color: #FDF2F8;
        }

        /* Profile Content */
        .content {
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
            background-color: #0B0F19;
        }

        /* Main Avatar */
        .avatar-container {
            position: relative;
            width: 130px;
            height: 130px;
            background-color: #1F2937;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
            border: 3px solid #EC4899;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
            transition: transform 0.3s ease;
        }

        .avatar-container:hover {
            transform: scale(1.02);
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .camera-icon {
            position: absolute;
            background: rgba(0, 0, 0, 0.5);
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 32px;
        }

        .avatar-container:hover .camera-icon {
            opacity: 1;
        }

        .gallery-text {
            color: #9CA3AF;
            font-size: 13px;
            margin-bottom: 30px;
            text-align: center;
        }

        /* Default Avatar Selection */
        .avatar-selection-title {
            color: #EC4899;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
            align-self: flex-start;
            width: 100%;
        }

        .avatar-list {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 35px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .avatar-list::-webkit-scrollbar {
            height: 4px;
        }
        .avatar-list::-webkit-scrollbar-thumb {
            background-color: #374151;
            border-radius: 4px;
        }

        .avatar-item {
            min-width: 65px;
            height: 65px;
            border-radius: 50%;
            background-color: #1F2937;
            border: 2px solid #374151;
            margin-right: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .avatar-item:last-child {
            margin-right: 0;
        }

        .avatar-item:hover {
            border-color: #FBCFE8;
            transform: translateY(-3px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }

        .avatar-item.active {
            border-color: #EC4899;
            transform: scale(1.08);
            box-shadow: 0 0 12px rgba(236, 72, 153, 0.4);
        }

        /* Using URLs parameter values suitable for Islamic look via Dicebear avataaars */
        .avatar-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Input Fields */
        .card-container {
            background-color: #111827;
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            border: 1px solid #1F2937;
        }

        .form-group {
            width: 100%;
            position: relative;
            margin-bottom: 20px;
        }
        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-group fieldset {
            border: 1px solid #374151;
            border-radius: 10px;
            padding: 0 15px 12px 15px;
            background-color: transparent;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-group fieldset:focus-within {
            border-color: #EC4899;
            box-shadow: 0 0 8px rgba(236, 72, 153, 0.2);
        }

        .form-group legend {
            color: #EC4899;
            font-size: 13px;
            font-weight: 500;
            padding: 0 5px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: #F9FAFB;
            font-size: 15px;
            outline: none;
            margin-top: 5px;
        }

        .form-group textarea {
            resize: none;
            height: 70px;
            line-height: 1.5;
        }

        /* Bottom Button */
        .save-btn {
            width: calc(100% - 48px);
            margin: 0 24px 24px 24px;
            background-color: #EC4899;
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
            text-align: center;
        }

        .save-btn:hover {
            background-color: #DB2777;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(236, 72, 153, 0.3);
        }
        .save-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="header">
        <span class="back-btn">←</span>
        <span class="title">প্রোফাইল সংশোধন</span>
        <span class="tick-btn">✓</span>
    </div>

    <div class="content">
        <!-- Main Selected Avatar -->
        <div class="avatar-container">
            <img id="mainAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Ali&top=shortHair&facialHair=beardLight" alt="Current Avatar">
            <div class="camera-icon">📷</div>
        </div>
        <div class="gallery-text">গ্যালারি থেকে ছবি পরিবর্তন করতে এখানে ট্যাপ করুন</div>

        <div class="avatar-selection-title">ডিফল্ট অবতার বেছে নিন (Choose Default Avatar)</div>
        <div class="avatar-list">
            <!-- Islamic Style Avatars using Dicebear API -->
            <div class="avatar-item active" onclick="selectAvatar(this, 'https://api.dicebear.com/7.x/avataaars/svg?seed=Ali&top=shortHair&facialHair=beardLight')">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Ali&top=shortHair&facialHair=beardLight" alt="Muslim Man">
            </div>
            <div class="avatar-item" onclick="selectAvatar(this, 'https://api.dicebear.com/7.x/avataaars/svg?seed=Fatima&top=hijab')">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Fatima&top=hijab" alt="Hijab Woman">
            </div>
            <div class="avatar-item" onclick="selectAvatar(this, 'https://api.dicebear.com/7.x/avataaars/svg?seed=Omar&top=turban&facialHair=beardMajestic')">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Omar&top=turban&facialHair=beardMajestic" alt="Bearded Man Turban">
            </div>
            <div class="avatar-item" onclick="selectAvatar(this, 'https://api.dicebear.com/7.x/avataaars/svg?seed=Aisha&top=hijab&clothing=blazerAndSweater')">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aisha&top=hijab&clothing=blazerAndSweater" alt="Hijab Professional">
            </div>
            <div class="avatar-item" onclick="selectAvatar(this, 'https://api.dicebear.com/7.x/avataaars/svg?seed=Yusuf&top=shortHair&facialHair=beardMedium')">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Yusuf&top=shortHair&facialHair=beardMedium" alt="Man with Beard">
            </div>
        </div>

        <div class="card-container">
            <div class="form-group">
                <fieldset>
                    <legend>প্রদর্শন নাম (Display Name)</legend>
                    <input type="text" value="Boss 🤫">
                </fieldset>
            </div>

            <div class="form-group">
                <fieldset>
                    <legend>আমার পরিচিতি (Bio)</legend>
                    <textarea>আসসালামু আলাইকুম! আমি MuslimsLibrary-এর একজন সদস্য।</textarea>
                </fieldset>
            </div>
        </div>
    </div>

    <button class="save-btn">তথ্য সংরক্ষণ করুন</button>
</div>

<script>
    function selectAvatar(element, src) {
        // Remove active class from all
        document.querySelectorAll('.avatar-item').forEach(el => {
            el.classList.remove('active');
        });
        // Add active class to clicked
        element.classList.add('active');
        // Update main avatar image
        document.getElementById('mainAvatar').src = src;
    }
</script>

</body>
</html>
